<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pub Jukebox — Playback</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg-overlay: rgba(0,0,0,0.65);
      --card-bg: rgba(0,0,0,0.75);
      --accent: #ffd700;
      --muted: #d6d6d6;
    }

    html,body{
      height:100%;
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: url("pictures/backg.jpeg") no-repeat center center fixed;
      background-size: cover;
      color:#fff;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    header{
      background: rgba(0,0,0,0.6);
      padding:16px 20px;
      text-align:center;
      font-size:20px;
      font-weight:700;
    }

    main{
      flex:1;
      padding:18px;
      display:flex;
      gap:18px;
      box-sizing:border-box;
      align-items:flex-start;
      justify-content:center;
      flex-wrap:wrap;
    }

    /* Left column: large Now Playing (up to 1080px wide) */
    .left-col{
      width:100%;
      max-width:1080px;
      background:var(--bg-overlay);
      border-radius:10px;
      padding:18px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .player-visual{
      width:100%;
      height:608px;
      max-height:608px;
      background:linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.75));
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#bbb;
      font-size:18px;
      position:relative;
      overflow:hidden;
    }

    .player-overlay {
      position:absolute;
      left:12px;
      bottom:12px;
      right:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

.track-info {
  display: flex;
  flex-direction: column; /* stack text below the art */
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.art {
  width: 304px;   /* half of player-visual height */
  height: 304px;  /* half of player-visual height */
  background: #222;
  border-radius: 12px; /* slightly larger radius for bigger tile */
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  font-size: 14px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
}

    .meta{
      min-width:0;
    }
    .meta .title{ font-size:20px; font-weight:700; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta .artist{ margin:4px 0 0 0; color:var(--muted); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .player-controls{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn{
      background:var(--accent);
      color:#000;
      border:none;
      padding:10px 14px;
      border-radius:6px;
      cursor:pointer;
      font-weight:700;
    }
    .btn.ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid rgba(255,255,255,0.06);
    }

/* Make the whole playerVisual show album art */
#playerVisual {
  position: relative;
  background-color: #111; /* fallback */
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  transition: background-image 300ms ease-in-out;
  overflow: hidden;
}

/* Dark overlay so text remains readable */
#playerVisual::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  pointer-events: none;
  z-index: 1;
}

.player-overlay {
  position: relative;
  z-index: 2; /* keep text above overlay */
}


    /* small "Playing Next" strip under the visual */
    .playing-next {
      width:100%;
      max-width:1080px;
      background:rgba(0,0,0,0.55);
      border-radius:8px;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-sizing:border-box;
      color:var(--muted);
      font-size:14px;
    }
    .playing-next .label{ color:var(--accent); font-weight:700; margin-right:12px; }
    .playing-next .next-title{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%; }

    /* Right column: search + queue */
    .right-col{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      background:var(--card-bg);
      padding:14px;
      border-radius:10px;
      box-sizing:border-box;
    }

    .search-row{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .search-row input{
      flex:1;
      padding:10px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.06);
      background:transparent;
      color:#fff;
      outline:none;
    }
    .search-results{
      margin-top:10px;
      max-height:220px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .result-item{
      display:flex;
      gap:10px;
      align-items:center;
      padding:8px;
      border-radius:6px;
      background:rgba(255,255,255,0.02);
      cursor:pointer;
    }
    .result-item:hover{ background:rgba(255,255,255,0.04); }

    .queue-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:320px;
      overflow:auto;
      margin-top:8px;
    }
    .queue-item{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      padding:8px;
      border-radius:6px;
      background:rgba(255,255,255,0.02);
      font-size:14px;
    }
    .queue-item .meta{ color:var(--muted); font-size:13px; }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    footer{
      background: rgba(0,0,0,0.6);
      text-align:center;
      padding:10px;
      font-size:14px;
      color:var(--muted);
    }

    @media (max-width:1200px){
      main{ padding:12px; gap:12px; }
      .player-visual{ height:420px; }
      .art{ width:96px; height:96px; }
    }

  </style>
</head>
<body>
  <header>🎵 Pub Jukebox — Playback</header>

<main>
  <!-- Left: Now Playing visual (up to 1080px block) -->
  <section class="left-col card" aria-label="Now Playing">
    <div class="player-visual" id="playerVisual">
      <div id="playerPlaceholder"></div>

      <div class="player-overlay">
        <div class="track-info">
          <div class="art" id="nowArt"></div>
          <div class="meta">
            <div class="title" id="nowTitle">Idle</div>
            <div class="artist" id="nowArtist">Default playlist</div>
            <div class="small" id="nowMode">Mode: DEFAULT</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Playing Next strip -->
    <div class="playing-next" id="playingNext">
      <div class="small" id="queueCount">Paid queue: 0</div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
      <div class="small" id="statusText">Status: idle</div>
    </div>
  </section>

<!-- Right: Add flow and Paid Queue -->
<aside class="right-col">

  <!-- Add flow -->
  <div class="card" aria-label="Add to paid playlist">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-weight:700;">Add To Paid Playlist</div>
      <div class="small">Users must select package & pay</div>
    </div>

    <!-- Add Songs button -->
    <div style="margin-top:20px;text-align:center;">
      <button class="btn" id="addSongsBtn" onclick="togglePackageDropdown()">
        Add Songs
      </button>
    </div>

    <!-- Dropdown with package options (hidden by default) -->
    <div id="packageDropdown" style="display:none;margin-top:12px;">
      <select id="packageSelect" class="btn" onchange="handlePackageSelect()">
        <option value="">-- Select Package --</option>
        <option value="10-2">R10 (1–2 songs, max 10 min)</option>
        <option value="20-4">R20 (3–4 songs, max 20 min)</option>
        <option value="40-6">R40 (4–6 songs, max 30 min)</option>
        <option value="50-8">R50 (6–8 songs, ~40 min)</option>
        <option value="100-12">R100 (9–12 songs, ~50 min)</option>
        <option value="150-15">R150 (10–15 songs, ~60 min)</option>
        <option value="200-20">R200 (15–20 songs, ~90 min)</option>
      </select>
    </div>

    <!-- Search UI (locked until payment) -->
    <div class="search-row" id="searchRow" style="margin-top:12px;display:none;">
      <input id="searchInput" placeholder="Search Spotify (title or artist)" 
             onkeydown="if(event.key==='Enter') searchTracks()" />
      <button class="btn" onclick="searchTracks()">Search</button>
    </div>

    <div class="search-results" id="searchResults" aria-live="polite"></div>
    <div class="small" style="margin-top:8px;">Tip: search unlocks after payment.</div>
  </div>

  <!-- Paid queue -->
  <div class="card" aria-label="Paid queue">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-weight:700;">Paid Queue</div>
      <div class="small" id="queueInfo">Plays in order; no jumping</div>
    </div>

    <div class="queue-list" id="paidQueue"></div>

    <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
      <div class="small" id="queueDurationText">Estimated duration: 0 min</div>
      <div id="paidQueueControls"></div>
    </div>
  </div>

</aside>

</main>


  <footer>Powered by Spotify Premium • Pub Jukebox System</footer>

  <script>
/* ====== Paid queue app (fixed) ====== */
const paidQueue = [];
let paidSessionActive = false;
let redirectTimeoutHandle = null;

let currentPackage = null;          // { price: "10", maxSongs: 2 }
let paymentComplete = false;
let songsAddedThisSession = 0;

/* DOM bindings (cached) */
const nowTitle = document.getElementById('nowTitle');
const nowArtist = document.getElementById('nowArtist');
const nowArt = document.getElementById('nowArt');
const nowMode = document.getElementById('nowMode');
const statusText = document.getElementById('statusText');
const queueCount = document.getElementById('queueCount');
const paidQueueEl = document.getElementById('paidQueue');
const queueDurationText = document.getElementById('queueDurationText');
const searchResultsEl = document.getElementById('searchResults');
const nextTitleEl = document.getElementById('nextTitle');

/* ====== Startup validation ====== */
(function validateDomBindings(){
  const missing = [];
  if (!paidQueueEl) missing.push('paidQueueEl');
  if (!queueCount) missing.push('queueCount');
  if (!queueDurationText) missing.push('queueDurationText');
  if (!nextTitleEl) missing.push('nextTitleEl');
  if (!nowTitle) missing.push('nowTitle');
  if (missing.length) {
    console.error('Missing DOM elements:', missing.join(', '));
    if (statusText) statusText.textContent = 'UI initialization error: missing elements';
  }
})();

/* ====== Helpers ====== */
function escapeHtml(s){
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatMs(ms){
  if (!ms || isNaN(ms)) return '0:00';
  const total = Math.round(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

/* ====== Queue rendering & controls ====== */
function renderQueue(){
  if (!paidQueueEl) return;

  paidQueueEl.innerHTML = '';

  let totalMs = 0;
  paidQueue.forEach((item) => {
    totalMs += item.duration_ms || 0;
    const div = document.createElement('div');
    div.className = 'queue-item';
    div.innerHTML = `
      <div style="min-width:0">
        <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          ${escapeHtml(item.title)}
        </div>
        <div class="meta">${escapeHtml(item.artist)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
        <div class="small">${formatMs(item.duration_ms)}</div>
      </div>
    `;
    paidQueueEl.appendChild(div);
  });

  queueCount.textContent = `Paid queue: ${paidQueue.length}`;
  queueDurationText.textContent = `Estimated duration: ${Math.round(totalMs/60000)} min`;

  if (paidQueue.length > 0) {
    nextTitleEl.textContent = `${paidQueue[0].title} — ${paidQueue[0].artist}`;
  } else {
    nextTitleEl.textContent = 'No paid tracks queued';
  }

  renderPaidQueueControls();
  updateStartPlayButton();
}

function removeFromQueue(index){
  alert('Paid tracks cannot be removed once queued.');
}

/* Start Play button state */
function updateStartPlayButton(){
  const btn = document.getElementById('startPlayBtn');
  if (btn) {
    btn.disabled = (paidQueue.length === 0 || paidSessionActive);
    btn.textContent = paidSessionActive ? 'Playing' : 'Start Play';
  }
}

/* Render controls area (JS-managed button) */
function renderPaidQueueControls(){
  const controls = document.getElementById('paidQueueControls');
  if (!controls) return;

  controls.innerHTML = '';

  const startBtn = document.createElement('button');
  startBtn.className = 'btn';
  startBtn.id = 'startPlayBtn';
  startBtn.textContent = 'Start Play';
  startBtn.onclick = () => {
    if (paidQueue.length === 0) return;
    startPaidQueuePlayback();
  };

  const spacer = document.createElement('div');
  spacer.style.flex = '1';

  controls.appendChild(startBtn);
  controls.appendChild(spacer);

  updateStartPlayButton();
}

/* ====== Playback orchestration (uses backend stubs) ====== */
async function startPaidQueuePlayback(){
  if (!paidQueue || paidQueue.length === 0) return;
  if (paidSessionActive) return; // already playing paid queue

  if (redirectTimeoutHandle){
    clearTimeout(redirectTimeoutHandle);
    redirectTimeoutHandle = null;
  }

  paidSessionActive = true;
  nowMode.textContent = 'Mode: PAID';
  statusText.textContent = 'Playing paid queue';
  renderPaidQueueControls();
  updateStartPlayButton();

  try {
    if (typeof backendPause === 'function') await backendPause();

    // Snapshot the queue at the moment playback starts
    const snapshotQueue = paidQueue.slice();
    const uris = snapshotQueue.map(i => i.uri);
    const totalMs = snapshotQueue.reduce((s,i)=>s + (i.duration_ms || 210000), 0);

    const first = snapshotQueue[0];
    if (first && typeof setNowPlaying === 'function') setNowPlaying(first.title, first.artist, first.albumArt);

    let result = null;
    if (typeof backendPlayUris === 'function') {
      result = await backendPlayUris(uris);
      if (typeof pollStatusOnce === 'function') await pollStatusOnce();
    }

    if (result && result.ok) {
      // Remove only the items that were in the snapshot (played items)
      // Find how many items were in the snapshot and remove that many from the front
      const playedCount = snapshotQueue.length;
      if (playedCount > 0) {
        // If paidQueue has been appended to, only remove the first playedCount items
        paidQueue.splice(0, Math.min(playedCount, paidQueue.length));
      }
      renderQueue();
    } else if (!result) {
      // If backendPlayUris not provided, assume local playback and remove snapshot items
      const playedCount = snapshotQueue.length;
      if (playedCount > 0) {
        paidQueue.splice(0, Math.min(playedCount, paidQueue.length));
      }
      renderQueue();
    } else {
      // Playback failed; do not remove queue items
      statusText.textContent = 'Playback/queue failed. Please try again.';
      paidSessionActive = false;
      nowMode.textContent = 'Mode: DEFAULT';
      renderPaidQueueControls();
      updateStartPlayButton();
      return;
    }

    // Schedule end-of-session actions after the snapshot duration
    setTimeout(async () => {
      paidSessionActive = false;
      nowMode.textContent = 'Mode: DEFAULT';
      statusText.textContent = 'Resuming default playlist';
      renderPaidQueueControls();
      updateStartPlayButton();

      try {
        if (typeof backendResume === 'function') {
          await backendResume();
          if (typeof pollStatusOnce === 'function') await pollStatusOnce();
        }
      } catch (e) {
        console.warn('resume failed', e);
      }

      if (redirectTimeoutHandle) clearTimeout(redirectTimeoutHandle);
      redirectTimeoutHandle = setTimeout(() => {
        if (paidSessionActive) return;
        window.location.href = 'index.html';
      }, 30000);

    }, totalMs + 2000);

  } catch (err) {
    console.error('startPaidQueuePlayback error', err);
    statusText.textContent = 'Playback error';
    paidSessionActive = false;
    nowMode.textContent = 'Mode: DEFAULT';
    renderPaidQueueControls();
    updateStartPlayButton();
  }
}

/* ====== Search + results rendering (fixed wiring) ====== */
async function searchTracks(){
  const qEl = document.getElementById('searchInput');
  const q = qEl ? qEl.value.trim() : '';
  if (!searchResultsEl) return;
  searchResultsEl.innerHTML = '';
  if(!q) return;
  searchResultsEl.innerHTML = '<div class="small">Searching…</div>';
  try{
    const res = await fetch('/api/search', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ q })
    });
    if(!res.ok) throw new Error('search failed');
    const results = await res.json(); // expect array of { uri, title, artist, duration_ms, albumArt }
    renderSearchResults(results);
  }catch(e){
    searchResultsEl.innerHTML = '<div class="small">Search failed. Try again.</div>';
    console.warn(e);
  }
}

function renderSearchResults(results){
  if (!searchResultsEl) return;
  searchResultsEl.innerHTML = '';
  if(!results || results.length === 0){
    searchResultsEl.innerHTML = '<div class="small">No results</div>';
    return;
  }

  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.style.display = 'flex';
    item.style.gap = '12px';
    item.style.alignItems = 'center';

    const left = document.createElement('div');
    left.style.flex = '1';
    left.style.minWidth = '0';
    left.innerHTML = `
      <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        ${escapeHtml(r.title)}
      </div>
      <div class="small">${escapeHtml(r.artist)}</div>
    `;

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.flexDirection = 'column';
    right.style.gap = '6px';
    right.style.alignItems = 'flex-end';

    const dur = document.createElement('div');
    dur.className = 'small';
    dur.textContent = formatMs(r.duration_ms);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn';
    addBtn.textContent = 'Add';
    // Attach handler in JS so we pass the real object and enforce package rules
    addBtn.onclick = () => addToPaidQueue(r);

    right.appendChild(dur);
    right.appendChild(addBtn);

    item.appendChild(left);
    item.appendChild(right);
    searchResultsEl.appendChild(item);
  });
}

/* ====== Package dropdown flow (Add Songs button) ====== */
function togglePackageDropdown(){
  const dropdown = document.getElementById('packageDropdown');
  if (!dropdown) return;
  dropdown.style.display = (dropdown.style.display === 'none' || dropdown.style.display === '') 
    ? 'block' 
    : 'none';
}

function handlePackageSelect(){
  const select = document.getElementById('packageSelect');
  if (!select || !select.value) return;
  const [price, songs] = select.value.split('-');
  const params = new URLSearchParams({ price, songs });
  // Redirect to payment page where your payment flow will run
  window.location.href = `payment.html?${params.toString()}`;
}

/* ====== Payment callbacks and enforcement ====== */
/* Call this from your payment page after successful payment to unlock search UI.
   Example on payment.html after verifying payment:
     window.opener && window.opener.onPaymentSuccessFromPaymentPage({ price:'20', songs:4 });
   Or call onPaymentSuccess() in the same window if you redirect back to the main page.
*/
function onPaymentSuccess(){
  if (!currentPackage){
    // If currentPackage not set (e.g., user returned from payment page),
    // try to read from query string
    applyPackageFromQuery({ autoMarkPaid: true });
    if (!currentPackage){
      alert('No package selected. Please start from Add Songs.');
      return;
    }
  }

  paymentComplete = true;
  songsAddedThisSession = 0;

  const searchRow = document.getElementById('searchRow');
  if (searchRow) searchRow.style.display = 'flex';

  statusText.textContent = `Payment complete for R${currentPackage.price}. You may now add up to ${currentPackage.maxSongs} songs.`;
}

/* Helper to parse price/songs from URL and set currentPackage.
   If autoMarkPaid is true, it will also set paymentComplete = true.
   Use this on payment.html or on return to main page.
*/
function applyPackageFromQuery({ autoMarkPaid = false } = {}){
  const params = new URLSearchParams(window.location.search);
  const price = params.get('price');
  const songs = params.get('songs');
  if (!price || !songs) return null;
  const maxSongs = parseInt(songs, 10) || 0;
  currentPackage = { price, maxSongs };
  paymentComplete = !!autoMarkPaid;
  songsAddedThisSession = 0;
  return currentPackage;
}

/* Called when user clicks "Add Songs" (keeps behavior for legacy) */
function startAddFlow(){
  if (!paymentComplete){
    alert('Please select a package and complete payment before adding songs.');
    return;
  }
  const searchRow = document.getElementById('searchRow');
  if (searchRow) searchRow.style.display = 'flex';
}

/* ====== Add to queue with enforcement ====== */
function addToPaidQueue(track){
  if (!paymentComplete || !currentPackage){
    alert('You must pay for a package before adding songs.');
    return;
  }

  if (songsAddedThisSession >= currentPackage.maxSongs){
    alert(`You have reached the limit of ${currentPackage.maxSongs} songs for this package.`);
    return;
  }

  // Append to the existing paidQueue (do not overwrite)
  paidQueue.push({
    uri: track.uri,
    title: track.title,
    artist: track.artist,
    duration_ms: track.duration_ms || 0,
    albumArt: track.albumArt || '',
    addedAt: Date.now()
  });

  songsAddedThisSession++;
  renderQueue();

  // If a paid session is already active, do NOT attempt to start a new one.
  // The currently playing snapshot will finish and the newly added track will remain in the queue.
  if (!paidSessionActive){
    startPaidQueuePlayback();
  }
}


/* ====== Optional: expose some functions for payment page to call ====== */
window.applyPackageFromQuery = applyPackageFromQuery;
window.onPaymentSuccess = onPaymentSuccess;

/* ====== End of fixed script ====== */


// frontend: play first track, disable shuffle/repeat, queue rest, and return {ok:true} on success
async function backendPlayUris(uris){
  try {
    if (!uris || uris.length === 0) return { ok: false, error: 'no uris' };

    // 1) Ask backend to disable shuffle and repeat and play the first track
    let res = await fetch('/api/play', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ uris: [uris[0]], isPaid: true })
    });
    const playData = await res.json().catch(()=>({}));
    console.log('/api/play response:', res.status, playData);
    if (!res.ok) {
      return { ok: false, error: 'play failed', details: playData };
    }

    // small delay so device registers playback context
    await new Promise(r => setTimeout(r, 350));

    // 2) Queue the rest sequentially and ensure each succeeded
    for (let i = 1; i < uris.length; i++) {
      const qRes = await fetch(`/api/queue?uri=${encodeURIComponent(uris[i])}`, { method: 'POST' });
      const qData = await qRes.json().catch(()=>({}));
      console.log('/api/queue response:', qRes.status, qData);
      if (!qRes.ok) {
        return { ok: false, error: 'queue failed', uri: uris[i], details: qData };
      }
      // tiny delay to avoid device race conditions
      await new Promise(r => setTimeout(r, 150));
    }

    // 3) Safety: after a short delay, ask backend to check if Spotify advanced; if not, call next
    // (backend should expose /api/player/check-and-next or we call /api/next directly)
    setTimeout(async () => {
      try {
        const check = await fetch('/api/player/check-and-next', { method: 'POST' });
        // backend will return { advanced: true } if Spotify moved on, or will call next if stuck
        console.log('/api/player/check-and-next', await check.json().catch(()=>({})));
      } catch (e) {
        console.warn('check-and-next failed', e);
      }
    }, 2000);

    return { ok: true };
  } catch (e) {
    console.error('backendPlayUris error', e);
    return { ok: false, error: e.message };
  }
}

async function pollStatusOnce(){
  try{
    const res = await fetch('/api/status');
    if(!res.ok) return;
    const data = await res.json();

    // Update now playing
    if(data.title) nowTitle.textContent = data.title;
    if(data.artist) nowArtist.textContent = data.artist;
    if(data.albumArt) nowArt.style.backgroundImage = data.albumArt ? `url(${data.albumArt})` : '';

    // Mode and status
    nowMode.textContent = `Mode: ${data.mode || 'DEFAULT'}`;
    statusText.textContent = data.mode === 'PAID' ? 'Playing paid queue' : (data.is_playing ? 'Playing' : 'Paused');

    // If we are in a paid session and the local paidQueue still has items,
    // show the next paid track in the UI (authoritative source is Spotify, but this helps UX)
    if (paidSessionActive && paidQueue.length > 0) {
      nextTitleEl.textContent = `${paidQueue[0].title} — ${paidQueue[0].artist}`;
      queueCount.textContent = `Paid queue: ${paidQueue.length}`;
      queueDurationText.textContent = `Estimated duration: ${Math.round(paidQueue.reduce((s,i)=>s+(i.duration_ms||210000),0)/60000)} min`;
    } else {
      // If no local paid queue, fall back to server-provided next info if available
      if (data.next_title) nextTitleEl.textContent = data.next_title;
      queueCount.textContent = `Paid queue: ${paidQueue.length}`;
    }
  }catch(e){ console.warn('pollStatusOnce', e); }
}

    function formatMs(ms){
      if(!ms || isNaN(ms)) return '--:--';
      const s = Math.floor(ms/1000);
      const m = Math.floor(s/60);
      const sec = s%60;
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }
    function escapeHtml(str){
      if(!str) return '';
      return String(str).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]); });
    }

<script>
(async function handlePostPayment() {
  try {
    let tracks = JSON.parse(sessionStorage.getItem('tracks') || '[]');

    if ((!tracks || tracks.length === 0) && location.search) {
      const params = new URLSearchParams(location.search);
      const checkoutId = params.get('checkoutId') || sessionStorage.getItem('checkoutId');
      if (checkoutId) {
        const r = await fetch(`/api/checkout-tracks?checkoutId=${encodeURIComponent(checkoutId)}`);
        if (r.ok) {
          const json = await r.json();
          tracks = json.tracks || [];
        }
      }
    }

    if (tracks && tracks.length > 0) {
      await fetch('/webhook/payment-success', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tracks })
      });

      sessionStorage.removeItem('tracks');
      sessionStorage.removeItem('checkoutId');

      console.log('Payment successful — tracks submitted to server.');
    } else {
      console.log('No paid tracks found for this checkout.');
    }
  } catch (err) {
    console.error('Error handling payment success:', err);
  }
})();
</script>
    
<script>
(async function loadPaidTracks() {
  try {
    let tracks = JSON.parse(sessionStorage.getItem('tracks') || '[]');

    if ((!tracks || tracks.length === 0) && location.search) {
      const params = new URLSearchParams(location.search);
      const checkoutId = params.get('checkoutId');
      if (checkoutId) {
        const r = await fetch(`/api/checkout-tracks?checkoutId=${encodeURIComponent(checkoutId)}`);
        if (r.ok) {
          const json = await r.json();
          tracks = json.tracks || [];
        }
      }
    }

    if (tracks && tracks.length > 0) {
      paidQueue.push(...tracks.map(t => ({
        uri: t.uri,
        title: t.title || 'Unknown',
        artist: t.artist || '',
        duration_ms: t.duration_ms || 0,
        addedAt: Date.now()
      })));

      renderQueue();

      // Notify backend webhook
      await fetch('/webhook/payment-success', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tracks })
      });

      // Remove the alert message — set a neutral status or skip entirely
      statusText.textContent = 'Tracks queued and ready to play.';
      pollStatusOnce();
    }
  } catch (err) {
    console.error('Error loading paid tracks:', err);
  }
})();
</script>
