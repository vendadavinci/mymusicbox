<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pub Jukebox — Playback</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg-overlay: rgba(0,0,0,0.65);
    --card-bg: rgba(0,0,0,0.75);
    --accent: #ffd700;
    --muted: #d6d6d6;
  }

/* page layout */
html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: none;
}

/* background image layer (blurred) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: url("pictures/backg.jpeg");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  filter: blur(2px) brightness(0.6); /* reduced blur (50%) */
  transform: scale(1.015); /* slight scale to avoid edge artifacts */
  will-change: transform, filter;
}

/* content container sits above the blurred background */
.app, main, #root {
  position: relative;
  z-index: 1;
}

/* reduce blur on small screens for performance */
@media (max-width: 720px) {
  body::before {
    filter: blur(1px) brightness(0.65); /* reduced mobile blur */
    transform: scale(1.01);
  }
}


  header{
    background: rgba(0,0,0,0.6);
    padding:16px 20px;
    text-align:center;
    font-size:20px;
    font-weight:700;
  }

  main{
    flex:1;
    padding:18px;
    display:flex;
    gap:18px;
    box-sizing:border-box;
    align-items:flex-start;
    justify-content:center;
    flex-wrap:wrap;
  }

  /* Left column: large Now Playing (up to 1080px wide) */
  .left-col{
    width:100%;
    max-width:1080px;
    background:var(--bg-overlay);
    border-radius:10px;
    padding:18px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* Player visual container */
  .player-visual{
    width:100%;
    height:608px;
    max-height:608px;
    border-radius:8px;
    position:relative;
    overflow:hidden;
    background-color:#111; /* fallback */
    display:block;
  }

  /* Artwork fills the visual area */
  .art {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background: #222 center/cover no-repeat;
    border-radius: 8px; /* keep rounded corners with container */
    transform-origin:center;
    will-change:background-image;
  }

  /* Optional subtle zoom for nicer look */
  .art.img-zoom {
    transition: transform 8s ease;
    transform: scale(1.03);
  }

  /* Dark overlay so text remains readable */
  .player-visual::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 1;
    border-radius: 8px;
  }

  /* Overlay strip for track info (separate from art) */
  .player-overlay {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:12px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.0), rgba(0,0,0,0.65));
    z-index: 2;
    display:flex;
    justify-content:center;
    align-items:center;
    box-sizing:border-box;
  }

  /* Meta container centered and constrained */
  .meta {
    width:100%;
    max-width:920px;
    text-align:center;
    padding:6px 12px;
    box-sizing:border-box;
    backdrop-filter: blur(2px);
  }

  .meta .title{
    font-size:20px;
    font-weight:700;
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#fff;
  }

  .meta .artist{
    margin:6px 0 0 0;
    color:var(--muted);
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .meta .small{
    margin-top:6px;
    font-size:12px;
    color:#cfcfcf;
  }
#statusText,
#queueCount,
#nextTitleEl,
#queueDurationText {
  display: none;
}

  /* Keep track-info only for legacy layouts; not required for full-art layout */
  .track-info {
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    min-width:0;
  }

  .player-controls{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .btn{
    background:var(--accent);
    color:#000;
    border:none;
    padding:10px 14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:700;
  }
  .btn.ghost{
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,0.06);
  }

  /* small "Playing Next" strip under the visual */
  .playing-next {
    width:100%;
    max-width:1080px;
    background:rgba(0,0,0,0.55);
    border-radius:8px;
    padding:10px 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-sizing:border-box;
    color:var(--muted);
    font-size:14px;
  }
  .playing-next .label{ color:var(--accent); font-weight:700; margin-right:12px; }
  .playing-next .next-title{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%; }

  /* Right column: search + queue */
  .right-col{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .card{
    background:var(--card-bg);
    padding:14px;
    border-radius:10px;
    box-sizing:border-box;
  }

  .search-row{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .search-row input{
    flex:1;
    padding:10px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.06);
    background:transparent;
    color:#fff;
    outline:none;
  }
.search-results {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.02);
  cursor: pointer;
}
.result:hover {
  background: rgba(255,255,255,0.04);
}


  .queue-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:320px;
    overflow:auto;
    margin-top:8px;
  }
  .queue-item{
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:center;
    padding:8px;
    border-radius:6px;
    background:rgba(255,255,255,0.02);
    font-size:14px;
  }
  .queue-item .meta{ color:var(--muted); font-size:13px; }

  .small{
    font-size:12px;
    color:var(--muted);
  }

  footer{
    background: rgba(0,0,0,0.6);
    text-align:center;
    padding:10px;
    font-size:14px;
    color:var(--muted);
  }

  /* Responsive adjustments */
  @media (max-width:1200px){
    main{ padding:12px; gap:12px; }
    .player-visual{ height:420px; }
    .meta .title{ font-size:18px; }
    .meta .artist{ font-size:13px; }
  }

  @media (max-width:600px){
    .player-visual{ height:320px; }
    .meta{ padding:8px; }
    .meta .title{ font-size:16px; }
    .meta .artist{ font-size:12px; }
  }
.logo-banner {
  width: 100%;          /* stretch full width */
  height: auto;         /* keep aspect ratio */
  display: block;       /* remove inline spacing */
  object-fit: cover;    /* ensures it fills nicely */
}

.status.playing {
  font-weight: bold;
  color: green;
}
.status.added {
  color: goldenrod; /* yellowish */
}
.status.played {
  color: gray;
  font-style: italic;
}

</style>

</head>
<body>
  <header>
  <img src="/pictures/wavecontrol.png" alt="WaveControl Logo" class="logo-banner" />
</header>


<main>
  <!-- Left: Now Playing visual (up to 1080px block) -->
  <section class="left-col card" aria-label="Now Playing">
    <div class="player-visual" id="playerVisual">
      <!-- Artwork fills the visual and is controlled separately -->
      <div class="art" id="nowArt" role="img" aria-label="Album artwork" style="background-size:cover;background-position:center;"></div>

      <!-- Overlay strip for track info (separate from the art) -->
      <div class="player-overlay">
        <div class="meta">
          <div class="title small-label">NOW PLAYING:</div>
          <div class="title" id="nowTitle">Idle</div>
          <div class="artist" id="nowArtist">Default playlist</div>
          <div class="small" id="nowMode">Mode: DEFAULT</div>
        </div>
      </div>
    </div>

    <span id="progress-text" class="small" style="display:block;margin-top:8px;"></span>

    <!-- Playing Next strip (aligned with Checkout Queue) -->
    <div class="playing-next" id="playingNext" style="margin-top:12px;display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
        <div class="small" id="checkoutQueueCount">Paid queue: 0</div>
      </div>
      <div class="small" id="checkoutNextTitle">No paid tracks added</div>
        <div id="paidQueue" style="display:none;"></div>

    </div>


  </section>

  <aside class="right-col">
    <!-- Add flow -->
    <div class="card" aria-label="Add to paid playlist">
      <div style="display:flex;justify-content:space-between;align-items:center;"></div>

      <!-- Add Songs button -->
      <div style="margin-top:20px;text-align:center;">
        <button class="btn" id="addSongsBtn" onclick="togglePackageDropdown()">
          Add Songs
        </button>
      </div>

      <!-- Dropdown with package options (hidden by default) -->
      <div id="packageDropdown" style="display:none;margin-top:12px;">
        <select id="packageSelect" class="btn" onchange="handlePackageSelect()">
          <option value="">-- Select Package --</option>
          <option value="10-2">R10 (1–2 songs, max 10 min)</option>
          <option value="20-4">R20 (3–4 songs, max 20 min)</option>
          <option value="40-6">R40 (4–6 songs, max 30 min)</option>
          <option value="50-8">R50 (6–8 songs, ~40 min)</option>
          <option value="100-12">R100 (9–12 songs, ~50 min)</option>
          <option value="150-15">R150 (10–15 songs, ~60 min)</option>
          <option value="200-20">R200 (15–20 songs, ~90 min)</option>
        </select>

        <!-- Dynamic form panel -->
        <div class="form-panel" id="formPanel">
          <h3>Select package to continue</h3>
          <div class="note" id="instructionNote"></div>

          <!-- package summary -->
          <div class="form-row" id="packageSummary" style="display:none;">
            <label>Package</label>
            <div id="pkgLabel" style="font-weight:700;color:var(--accent);"></div>
          </div>

          <!-- dynamic slots container -->
          <div id="slotsContainer" style="margin-top:12px;"></div>

          <!-- selected tracks preview -->
          <div id="selectedContainer" style="display:none;">
            <h4 style="margin:12px 0 6px 0;color:var(--accent);">Selected tracks (will be queued after payment)</h4>
            <div class="selected-list" id="selectedList"></div>
          </div>

          <!-- payment controls -->
          <div style="margin-top:14px;display:flex;gap:8px;align-items:center;">
            <button class="btn" id="payBtn" onclick="startPayment()" disabled>Pay</button>
            <button class="btn ghost" onclick="cancelSelection()">Cancel</button>
            <div style="flex:1"></div>
            <div class="note" id="priceNote"></div>
          </div>

          <div class="note" style="margin-top:12px;"></div>
        </div>
      </div>

      <!-- Search UI (locked until payment) -->
      <div class="search-row" id="searchRow" style="margin-top:12px;display:none;">
        <input id="searchInput" placeholder="Search Spotify (title or artist)" 
               onkeydown="if(event.key==='Enter') searchTracks()" />
        <button class="btn" onclick="searchTracks()">Search</button>
      </div>

      <div class="search-results" id="searchResults" aria-live="polite"></div>
    </div>
    <!-- Paid queue -->
    <div class="card" aria-label="Checkout queue">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:700;">You Paid For:</div>
        <div class="small" id="checkoutQueueInfo">Plays in order; no jumping</div>
      </div>

      <div class="queue-list" id="checkoutQueueList"></div>

      <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
        <div class="small" id="checkoutQueueDuration">Estimated duration: 0 min</div>
<div id="statusText"></div>
<div id="queueCount"></div>
<div id="nextTitleEl"></div>
<div id="queueDurationText"></div>
 
      </div>
    </div>
  </aside>
</main>

  <footer>Powered by TicketMetro</footer>

<script>
/* ====== Paid queue app (fixed) ====== */
let paidQueue = [];
const slots = [];
let paidSessionActive = false;
let redirectTimeoutHandle = null;
let currentMode = 'DEFAULT';
let statusPollHandle = null;
let currentPackage = null;          // { price: "10", maxSongs: 2 }
let paymentComplete = false;
let songsAddedThisSession = 0;

/* DOM bindings (cached) */
const nowTitle            = document.getElementById('nowTitle');
const nowArtist           = document.getElementById('nowArtist');
const nowArt              = document.getElementById('nowArt');
const nowMode             = document.getElementById('nowMode');
const statusText          = document.getElementById('statusText');
const progressText        = document.getElementById('progress-text');

const queueCount          = document.getElementById('queueCount') 
                          || document.getElementById('checkoutQueueCount');
const queueDurationText   = document.getElementById('queueDurationText') 
                          || document.getElementById('checkoutQueueDuration');
const nextTitleEl         = document.getElementById('nextTitleEl') 
                          || document.getElementById('checkoutNextTitle');

const searchResultsEl     = document.getElementById('searchResults');
const formPanel           = document.getElementById('formPanel');
const slotsContainer      = document.getElementById('slotsContainer');
const selectedContainer   = document.getElementById('selectedContainer');
const selectedList        = document.getElementById('selectedList');
const payBtn              = document.getElementById('payBtn');
const addBtn              = document.getElementById('addBtn') 
                          || document.getElementById('addSongsBtn');
const pkgLabel            = document.getElementById('pkgLabel');
const packageSummary      = document.getElementById('packageSummary');
const priceNote           = document.getElementById('priceNote');
const instructionNote     = document.getElementById('instructionNote');

const checkoutQueueList   = document.getElementById('checkoutQueueList');
const checkoutQueueDuration = document.getElementById('checkoutQueueDuration');
const checkoutQueueInfo   = document.getElementById('checkoutQueueInfo');
const checkoutNextTitle = document.getElementById('checkoutNextTitle');

    function selectPackage(price, maxSongs){
      currentPackage = { price: price, maxSongs: maxSongs, label: `R${price} — up to ${maxSongs} songs` };
      slots.length = 0;
      slotsContainer.innerHTML = '';
      selectedList.innerHTML = '';
      selectedContainer.style.display = 'none';
      payBtn.disabled = true;
      packageSummary.style.display = 'flex';
      pkgLabel.textContent = currentPackage.label;
      priceNote.textContent = `Price: R${price}`;

      // create maxSongs slots
      for(let i=0;i<maxSongs;i++){
        const slot = { index: i, selected: null };
        slots.push(slot);
        slotsContainer.appendChild(createSlotElement(slot));
      }

      const info = document.createElement('div');
      info.className = 'note';
      info.style.marginTop = '6px';
      info.id = 'slotsInfo';
      info.textContent = `Search and pick up to ${maxSongs} tracks. You may leave some slots empty if package allows a range.`;
      slotsContainer.appendChild(info);

      updateButtonsForMode(currentMode);
    }

    function createSlotElement(slot){
      const wrapper = document.createElement('div');
      wrapper.className = 'search-slot';
      wrapper.id = `slot-${slot.index}`;

      const header = document.createElement('div');
      header.style.display = 'flex';
      header.style.justifyContent = 'space-between';
      header.style.alignItems = 'center';
      header.innerHTML = `<div style="font-weight:700">Song ${slot.index + 1}</div>
                          <div class="small">Top 10 results</div>`;
      wrapper.appendChild(header);

      const searchRow = document.createElement('div');
      searchRow.className = 'search-input';
      searchRow.style.marginTop = '8px';
      const input = document.createElement('input');
      input.placeholder = 'Search Spotify (title or artist)';
      input.id = `input-${slot.index}`;
      input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doSearch(slot.index); });
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = 'Search';
      btn.onclick = ()=> doSearch(slot.index);
      searchRow.appendChild(input);
      searchRow.appendChild(btn);
      wrapper.appendChild(searchRow);

      const results = document.createElement('div');
      results.className = 'results';
      results.id = `results-${slot.index}`;
      wrapper.appendChild(results);

      const selectedInfo = document.createElement('div');
      selectedInfo.className = 'note';
      selectedInfo.id = `selectedInfo-${slot.index}`;
      selectedInfo.textContent = 'No track selected';
      selectedInfo.style.marginTop = '8px';
      wrapper.appendChild(selectedInfo);

      return wrapper;
    }

      // Idempotency + pending submission helpers
function makeId() {
  return 'id-' + Math.random().toString(36).slice(2, 12);
}
function savePendingSubmission(payload) {
  try { sessionStorage.setItem('pendingSubmission', JSON.stringify(payload)); } catch (e) { /* ignore */ }
}
function getPendingSubmission() {
  try { const s = sessionStorage.getItem('pendingSubmission'); return s ? JSON.parse(s) : null; } catch (e) { return null; }
}
function clearPendingSubmission() {
  try { sessionStorage.removeItem('pendingSubmission'); } catch (e) { /* ignore */ }
}


    async function doSearch(slotIndex){
      const q = document.getElementById(`input-${slotIndex}`).value.trim();
      const resultsEl = document.getElementById(`results-${slotIndex}`);
      resultsEl.innerHTML = '<div class="small">Searching…</div>';
      if(!q){
        resultsEl.innerHTML = '<div class="small">Enter a search term.</div>';
        return;
      }

      try{
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ q, limit: 10 })
        });
        if(!res.ok) throw new Error('search failed');
        const results = await res.json(); // expect array of { uri, title, artist, duration_ms, albumArt }
        renderSearchResults(slotIndex, results.slice(0,10));
      }catch(err){
        console.warn(err);
        resultsEl.innerHTML = '<div class="small">Search failed. Try again.</div>';
      }
    }

// Utility: close search results if selectedList has items
function maybeCloseSearchResults(){
  const selectedList = document.getElementById('selectedList');
  const searchResults = document.getElementById('searchResults');
  const searchRow = document.getElementById('searchRow');

  if (selectedList && selectedList.children.length > 0) {
    if (searchResults) {
      searchResults.innerHTML = '';
      searchResults.style.display = 'none';
    }
    if (searchRow) {
      searchRow.style.display = 'none';
    }
  }
}

// Hook into your selection flow
function selectTrackForSlot(slotIndex, track){
  const slot = slots[slotIndex];
  slot.selected = {
    uri: track.uri,
    title: track.title,
    artist: track.artist,
    duration_ms: track.duration_ms || 0,
    albumArt: track.albumArt || ''
  };

  const info = document.getElementById(`selectedInfo-${slotIndex}`);
  info.textContent = `${track.title} — ${track.artist}`;
  updateSelectedList();

  // Force close search results if selectedList has items
  maybeCloseSearchResults();

  // Also hide this slot’s own results/input
  const resultsEl = document.getElementById(`results-${slotIndex}`);
  if (resultsEl) {
    resultsEl.innerHTML = '';
    resultsEl.style.display = 'none';
  }
  const inputEl = document.getElementById(`input-${slotIndex}`);
  if (inputEl) {
    inputEl.value = '';
    inputEl.blur();
  }
}

function renderSearchResults(slotIndex, results){
  const resultsEl = document.getElementById(`results-${slotIndex}`);
  resultsEl.innerHTML = '';
  if(!results || results.length === 0){
    resultsEl.innerHTML = '<div class="small">No results</div>';
    resultsEl.style.display = 'block';
    return;
  }

  // Only render the first 3 results
  results.slice(0,3).forEach(r => {
    const div = document.createElement('div');
    div.className = 'result';
    div.innerHTML = `
      <div style="min-width:0">
        <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(r.title)}</div>
        <div class="small">${escapeHtml(r.artist)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
        <div class="small">${formatMs(r.duration_ms)}</div>
        <button class="btn ghost">Select</button>
      </div>
    `;

    div.querySelector('button').addEventListener('click', (e) => {
      e.stopPropagation();
      selectTrackForSlot(slotIndex, r);
    });
    div.addEventListener('click', ()=> selectTrackForSlot(slotIndex, r));

    resultsEl.appendChild(div);
  });

  resultsEl.style.display = 'block';
}


// Called when user clicks "Add Songs" again
function reopenSlot(slotIndex){
  const slotWrapper = document.getElementById(`slot-${slotIndex}`);
  const resultsEl = document.getElementById(`results-${slotIndex}`);
  const inputEl = document.getElementById(`input-${slotIndex}`);
  const infoEl = document.getElementById(`selectedInfo-${slotIndex}`);

  if (slotWrapper) slotWrapper.style.display = 'block';
  if (resultsEl) {
    resultsEl.innerHTML = '';
    resultsEl.style.display = 'block';
  }
  if (inputEl) {
    inputEl.value = '';
    inputEl.focus();
  }
  if (infoEl) infoEl.textContent = 'No track selected';

  slots[slotIndex].selected = null;
}

function setNowPlaying({ title, artist, albumArtUrl, mode }) {
  const nowArt = document.getElementById('nowArt');
  const playerVisual = document.getElementById('playerVisual');
  const nowTitle = document.getElementById('nowTitle');
  const nowArtist = document.getElementById('nowArtist');
  const nowMode = document.getElementById('nowMode');

  nowTitle.textContent = title || 'Idle';
  nowArtist.textContent = artist || 'Default playlist';
  nowMode.textContent = mode ? `Mode: ${mode}` : 'Mode: DEFAULT';

  if (albumArtUrl) {
    nowArt.style.backgroundImage = `url(${albumArtUrl})`;
    playerVisual.style.backgroundImage = `url(${albumArtUrl})`; // optional fallback
  } else {
    nowArt.style.backgroundImage = '';
    playerVisual.style.backgroundImage = '';
  }
}

    function updateSelectedList(){
      const selected = slots.filter(s => s.selected).map(s => s.selected);
      if(selected.length === 0){
        selectedContainer.style.display = 'none';
        payBtn.disabled = true;
        addBtn.disabled = true;
        return;
      }
      selectedContainer.style.display = 'block';
      selectedList.innerHTML = '';
      selected.forEach((t, idx) => {
        const div = document.createElement('div');
        div.className = 'selected-item';
        div.innerHTML = `
          <div style="min-width:0">
            <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(t.title)}</div>
            <div class="small">${escapeHtml(t.artist)}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="small">${formatMs(t.duration_ms)}</div>
            <button class="btn ghost" onclick="removeSelected('${t.uri}')">Remove</button>
          </div>
        `;
        selectedList.appendChild(div);
      });

      if(currentMode === 'PAID'){
        payBtn.disabled = true;
        addBtn.style.display = 'inline-block';
        addBtn.disabled = false;
      } else {
        payBtn.disabled = false;
        addBtn.style.display = 'none';
      }
    }

    function removeSelected(uri){

async function startPayment() {
  if (!currentPackage) return;
  const selected = slots.filter(s => s.selected).map(s => s.selected);
  if (selected.length === 0) return alert('Please select at least one track.');

  const amountInCents = Math.round((currentPackage.price || 0) * 100);
  const idempotencyKey = makeId();

  const pending = {
    id: idempotencyKey,
    createdAt: Date.now(),
    tracks: selected,
    package: currentPackage
  };

  // Persist pending submission locally before contacting backend
  savePendingSubmission(pending);

  // UI lock
  const payBtn = document.getElementById('payBtn');
  if (payBtn) {
    payBtn.disabled = true;
    payBtn.textContent = 'Processing…';
  }

  const payload = {
    amount: amountInCents,
    currency: 'ZAR',
    description: currentPackage.label || 'Musicbox Paid Session',
    tracks: selected
  };

  try {
    const res = await fetch('/api/create-payment', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Idempotency-Key': idempotencyKey
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch (e) { throw new Error('Invalid JSON from backend: ' + text); }

    if (data && data.checkoutUrl) {
      // store minimal checkout info so we can resume if user refreshes during payment
      if (data.checkoutId) sessionStorage.setItem('checkoutId', data.checkoutId);
      // redirect to payment provider
      window.location.href = data.checkoutUrl;
      return;
    }

    throw new Error(data && data.error ? data.error : 'No checkout URL returned');
  } catch (err) {
    console.error('startPayment error:', err);
    alert('Payment initialization failed. Try again.');
    if (payBtn) {
      payBtn.disabled = false;
      payBtn.textContent = 'Pay';
    }
  }
}



// initPage: fetch server status and merge canonical session into local queue
async function initPage() {
  try {
    const res = await fetch(`/api/status?userId=${window.currentUserId}`);

    const data = await res.json();
    if (!data || !data.success) return;

    const pending = getPendingSubmission();

    if (data.mode === 'PAID') {
      // persist canonical session id and merge server tracks into local queue
      sessionStorage.setItem('sessionId', data.sessionId);
      mergeServerQueueIntoLocal(data.tracks || []);
      if (typeof updateNowPlayingUI === 'function') updateNowPlayingUI(data);
      paidSessionActive = true;

      // If we have a pending submission, check whether server already has those tracks
      if (pending && Array.isArray(pending.tracks) && (data.tracks || []).length > 0) {
        const serverUris = new Set((data.tracks || []).map(t => t.uri));
        const allPresent = pending.tracks.every(t => serverUris.has(t.uri));
        if (allPresent || data.sessionId === pending.id) {
          clearPendingSubmission();
          selectedTracks = [];
          const selectedContainer = document.getElementById('selectedContainer');
          const selectedList = document.getElementById('selectedList');
          if (selectedContainer) selectedContainer.style.display = 'none';
          if (selectedList) selectedList.innerHTML = '';
        }
      }
    } else {
      // no server session: restore any local queue persisted earlier
      let local = sessionStorage.getItem('paidQueue');
      if (local) {
        try { paidQueue = JSON.parse(local); } catch (e) { paidQueue = []; }
      }
      paidQueue = paidQueue.filter(t => !t.played);
      renderQueue();
      paidSessionActive = false;

      if (pending) {
        showResumePaymentNotice(pending);
      }
    }
  } catch (e) {
    console.warn('initPage /api/status failed', e);
    // fallback: restore local queue if available
    let local = sessionStorage.getItem('paidQueue');
    if (local) {
      try { paidQueue = JSON.parse(local); } catch (err) { paidQueue = []; }
      paidQueue = paidQueue.filter(t => !t.played);
      renderQueue();
    }

    const pending = getPendingSubmission();
    if (pending) showResumePaymentNotice(pending);
  }
}

// Helper: fetch with timeout and one retry
async function fetchWithTimeout(url, opts = {}, timeout = 10000, retry = true) {
  const attempt = async () => {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(url, { ...opts, signal: controller.signal });
      clearTimeout(id);
      return res;
    } catch (err) {
      clearTimeout(id);
      throw err;
    }
  };

  try {
    return await attempt();
  } catch (err) {
    if (!retry) throw err;
    // small backoff then retry once
    await new Promise(r => setTimeout(r, 700));
    return await attempt();
  }
}

// Persist and read sent URIs per session to avoid re-sends
function getSentUrisKey(sessionId) { return `paidSent_${sessionId}`; }
function readSentUris(sessionId) {
  try {
    const raw = sessionStorage.getItem(getSentUrisKey(sessionId));
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.warn('readSentUris parse error', e);
    return [];
  }
}
function writeSentUris(sessionId, arr) {
  try {
    sessionStorage.setItem(getSentUrisKey(sessionId), JSON.stringify(Array.from(new Set(arr))));
  } catch (e) {
    console.warn('writeSentUris error', e);
  }
}

// Robust backendPlayTracks: filters duplicates, sends batch, returns parsed JSON
async function backendPlayTracks(tracks, { sessionId, append } = {}) {
  const sid = sessionId || sessionStorage.getItem('sessionId');
  if (!sid) throw new Error('Missing sessionId for backendPlayTracks');

  // Normalize minimal payload to reduce accidental duplicates
  const normalized = tracks.map(t => ({
    uri: t.uri,
    title: t.title,
    artist: t.artist,
    duration_ms: t.duration_ms || 0,
    albumArt: t.albumArt || t.album_art || ''
  }));

  // Filter out URIs we've already sent for this session
  const sentUris = readSentUris(sid);
  const toSend = normalized.filter(t => !sentUris.includes(t.uri));

  if (toSend.length === 0) {
    console.info('No new tracks to send to backend for session', sid);
    // Return a success-like object so callers treat this as OK
    return { ok: true, skipped: true, sent: 0 };
  }

  const payload = {
    sessionId: sid,
    userId: sessionStorage.getItem('userId') || null,
    append: !!append,
    tracks: toSend
  };

  try {
    const res = await fetchWithTimeout('/api/play', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }, 15000, true);

    // Defensive parse
    const text = await res.text().catch(() => '');
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch (e) { json = null; }

    if (!res.ok) {
      console.error('backendPlayTracks /api/play failed', res.status, text);
      throw new Error(`Play failed HTTP ${res.status}`);
    }

    // On success, record the URIs we just sent so we don't re-send them later
    const newSent = sentUris.concat(toSend.map(t => t.uri));
    writeSentUris(sid, newSent);

    return json || { ok: true, sent: toSend.length };
  } catch (err) {
    console.error('backendPlayTracks error', err);
    throw err;
  }
}

// Robust startPaidQueuePlayback: idempotent start, aligned with checkout/session durable link
async function startPaidQueuePlayback(sessionId, replace = false) {
  try {
    if (!Array.isArray(paidQueue) || paidQueue.length === 0) return;
    if (paidSessionActive) return; // already playing

    // Ensure sessionId and checkoutId exist
    let sid = sessionId || sessionStorage.getItem('sessionId');
    let checkoutId = sessionStorage.getItem('checkoutId');

    if (!checkoutId) {
      throw new Error('Missing checkoutId from server. Cannot start paid playback.');
    }

    if (!sid) {
      const today = new Date().toISOString().slice(0, 10);
      sid = `${today}-${checkoutId}-${Date.now().toString().slice(-6)}`;
      sessionStorage.setItem('sessionId', sid);
      sessionStorage.setItem(`sessionId_${checkoutId}`, sid);
    }

    // Prevent multiple starts for same session
    const startMarker = `paidStarted_${sid}`;
    if (sessionStorage.getItem(startMarker)) {
      console.info('startPaidQueuePlayback already attempted for', sid);
      paidSessionActive = true;
      nowMode.textContent = 'Mode: PAID';
      return;
    }
    sessionStorage.setItem(startMarker, 'true');

    // Clear redirect timeout
    if (typeof redirectTimeoutHandle !== 'undefined' && redirectTimeoutHandle) {
      clearTimeout(redirectTimeoutHandle);
      redirectTimeoutHandle = null;
    }

    // Set UI state
    paidSessionActive = true;
    nowMode.textContent = 'Mode: PAID';
    statusText && (statusText.textContent = 'Playing paid queue');

    // Pause default playback
    if (typeof backendPause === 'function') {
      try { await backendPause(); } catch (e) { console.warn('backendPause failed', e); }
    }

    // Snapshot local queue
    const snapshotQueue = paidQueue.slice();
    const totalMs = snapshotQueue.reduce((s, i) => s + (i.duration_ms || 210000), 0);

    // Update now playing UI
    const first = snapshotQueue[0];
    if (first && typeof setNowPlaying === 'function') {
      setNowPlaying(first.title, first.artist, first.albumArt);
    }

    // Send tracks to backend once, with durable identifiers
    let result = null;
    try {
      result = await backendPlayTracks(snapshotQueue, {
        sessionId: sid,
        checkoutId,
        append: false
      });
      if (result && result.ok === false) {
        throw new Error('Backend reported failure when starting paid playback');
      }
    } catch (err) {
      console.error('startPaidQueuePlayback backendPlayTracks failed', err);
      paidSessionActive = false;
      nowMode.textContent = 'Mode: DEFAULT';
      statusText && (statusText.textContent = 'Playback/queue failed. Please try again.');
      sessionStorage.removeItem(startMarker);
      throw err;
    }

    // Poll status once to sync UI
    if (typeof pollStatusOnce === 'function') {
      try { await pollStatusOnce(); } catch (e) { console.warn('pollStatusOnce failed', e); }
    }

    renderQueue && renderQueue();

    // Schedule fallback
    const clamp = ms => Math.max(5000, Math.min(ms, 1000 * 60 * 60));
    const waitMs = clamp(totalMs + 2000);

    setTimeout(async () => {
      if (paidSessionActive && readSentUris(sid).length > 0) {
        if (paidQueue.length > 0) {
          statusText && (statusText.textContent = 'Starting next paid queue...');
          try { await startPaidQueuePlayback(sid); } catch (e) { console.warn('restart next paid queue failed', e); }
          return;
        }
      }

      // End paid session locally and resume default playback
      paidSessionActive = false;
      nowMode.textContent = 'Mode: DEFAULT';
      statusText && (statusText.textContent = 'Resuming default playlist');

      try {
        if (typeof backendResume === 'function') {
          await backendResume();
          if (typeof pollStatusOnce === 'function') await pollStatusOnce();
        }
      } catch (e) {
        console.warn('backendResume failed', e);
      }

      if (typeof redirectTimeoutHandle !== 'undefined' && redirectTimeoutHandle) clearTimeout(redirectTimeoutHandle);
      redirectTimeoutHandle = setTimeout(() => {
        if (paidSessionActive) return;
        window.location.href = 'index.html';
      }, 30000);

    }, waitMs);

  } catch (err) {
    console.error('startPaidQueuePlayback error', err);
    paidSessionActive = false;
    nowMode.textContent = 'Mode: DEFAULT';
    statusText && (statusText.textContent = 'Playback error');
  }
}

// Robust startPaidCheckout: idempotent, defensive, and copy-paste ready
async function startPaidCheckout(tracks) {
  // Small helper to fetch with timeout and one retry
  const fetchWithTimeoutAndRetry = async (url, opts = {}, timeout = 10000, retries = 1) => {
    const attempt = async () => {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(url, { ...opts, signal: controller.signal });
        clearTimeout(id);
        return res;
      } catch (err) {
        clearTimeout(id);
        throw err;
      }
    };

    for (let i = 0; i <= retries; i++) {
      try {
        return await attempt();
      } catch (err) {
        if (i === retries) throw err;
        // small backoff before retry
        await new Promise(r => setTimeout(r, 700));
      }
    }
  };

  try {
    if (!Array.isArray(tracks) || tracks.length === 0) {
      throw new Error('No tracks provided for checkout.');
    }

    // Ensure tracks are persisted so we can resume after redirect/refresh
    try {
      sessionStorage.setItem('tracks', JSON.stringify(tracks));
    } catch (e) {
      console.warn('Could not persist tracks to sessionStorage', e);
    }

    // Ensure a stable checkoutId for this payment flow
let checkoutId = sessionStorage.getItem('checkoutId');
if (!checkoutId) {
  throw new Error('Missing checkoutId from server. Cannot start checkout.');
}



    // Prevent double-initiation of the same checkout
    const submissionMarkerKey = `checkoutInit_${checkoutId}`;
    if (sessionStorage.getItem(submissionMarkerKey)) {
      console.info('Checkout already initiated for this checkoutId; skipping duplicate init.');
      // Optionally return the stored checkoutUrl if you saved it previously
      const savedUrl = sessionStorage.getItem(`checkoutUrl_${checkoutId}`);
      if (savedUrl) {
        window.location.href = savedUrl;
      }
      return;
    }

    // Compute total in cents (defensive)
    const totalCents = Math.round(
      tracks.reduce((acc, t) => acc + (Number(t.price) || 10), 0) * 100
    );

    const payload = {
      amount: totalCents,
      currency: 'ZAR',
      description: 'Musicbox Paid Session',
      tracks
    };

    // Call server to create checkout
    const res = await fetchWithTimeoutAndRetry('/api/yoco/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }, 12000, 1);

    if (!res) throw new Error('No response from server when creating checkout.');

    // Defensive content-type check
    const contentType = (res.headers.get('content-type') || '').toLowerCase();
    if (!res.ok) {
      // Try to extract server error message for debugging
      const text = await res.text().catch(() => '<no body>');
      throw new Error(`Create checkout failed: HTTP ${res.status} - ${text}`);
    }

    if (!contentType.includes('application/json')) {
      const text = await res.text().catch(() => '<no body>');
      throw new Error(`Expected JSON from create-checkout, got: ${text.slice(0, 200)}`);
    }

    const data = await res.json();

    if (!data || !data.success || !data.checkoutUrl) {
      console.error('Unexpected create-checkout response', data);
      alert('Payment initialization failed. Please try again.');
      return;
    }

    // Mark that we've initiated this checkout so refreshes won't re-initiate
    sessionStorage.setItem(submissionMarkerKey, 'true');
    // Persist checkoutUrl and checkoutId for later re-attachment
    sessionStorage.setItem(`checkoutUrl_${checkoutId}`, data.checkoutUrl);
    sessionStorage.setItem('checkoutId', checkoutId);

    // Navigate to checkout (redirect)
    window.location.href = data.checkoutUrl;

  } catch (err) {
    console.error('startPaidCheckout error:', err);
    // Friendly user feedback
    alert('Unable to start payment. Please check your connection and try again.');
  }
}

function getPendingSubmission() {
  try { return JSON.parse(sessionStorage.getItem('pendingSubmission') || 'null'); } catch (e) { return null; }
}
function clearPendingSubmission() {
  try {
    sessionStorage.removeItem('pendingSubmission');
    sessionStorage.removeItem('tracks');
    sessionStorage.removeItem('checkoutId');
  } catch (e) { /* ignore */ }
}
function persistPaidQueue() {
  try { sessionStorage.setItem('paidQueue', JSON.stringify(paidQueue)); } catch (e) { /* ignore */ }
}

// Start polling after checkout init

async function pollStatus() {
  try {
    const checkoutId = sessionStorage.getItem('checkoutId');
    if (!checkoutId) return;

    const res = await fetch(`/api/yoco/session-status?id=${encodeURIComponent(checkoutId)}`);
    if (!res.ok) {
      console.warn('session-status returned non-ok', res.status);
      return;
    }
    const data = await res.json();

    if (data.status !== 'successful') return;

    const pending = typeof getPendingSubmission === 'function' ? getPendingSubmission() : null;
    let tracksToEnqueue = Array.isArray(pending?.tracks) && pending.tracks.length
      ? pending.tracks.slice()
      : JSON.parse(sessionStorage.getItem('tracks') || '[]');

    if (Array.isArray(data.enaddedUris) && data.enaddedUris.length) {
      const enaddedSet = new Set(data.enaddedUris);
      tracksToEnqueue = tracksToEnqueue.filter(t => !enaddedSet.has(t.uri));
    }

    const localSet = new Set((paidQueue || []).map(t => t.uri));
    tracksToEnqueue = tracksToEnqueue.filter(t => !localSet.has(t.uri));

    if (tracksToEnqueue.length === 0) {
      if (typeof clearPendingSubmission === 'function') clearPendingSubmission();
      if (statusPollHandle) { clearInterval(statusPollHandle); statusPollHandle = null; }
      if (typeof initPage === 'function') initPage();
      return;
    }

    for (const t of tracksToEnqueue) {
      paidQueue.push({
        uri: t.uri,
        title: t.title || t.name || '',
        artist: t.artist || (t.artists && t.artists.join(', ')) || '',
        duration_ms: t.duration_ms || 0,
        albumArt: t.albumArt || t.album_art || '',
        addedAt: Date.now(),
        played: !!t.played,
        status: 'Added',
        orderIndex: t.orderIndex || (paidQueue.length + 1)
      });
      sessionStorage.setItem(`added_${checkoutId}_${t.uri}`, 'true');
    }

    if (typeof persistPaidQueue === 'function') persistPaidQueue();
    if (typeof renderQueue === 'function') renderQueue();

    if (!paidSessionActive && typeof startPaidQueuePlayback === 'function') {
      startPaidQueuePlayback();
    }

    if (typeof clearPendingSubmission === 'function') clearPendingSubmission();
    if (statusPollHandle) { clearInterval(statusPollHandle); statusPollHandle = null; }
    if (typeof initPage === 'function') initPage();

  } catch (err) {
    console.error('pollStatus error:', err);
  }
}

// Adaptive Spotify playback polling
let pollHandle = null;
let currentInterval = 8000; // default 8s when idle

function setNowPlaying(title, artist, albumArt) {
  nowTitle.textContent = title || '';
  nowArtist.textContent = artist || '';
  nowArt.style.backgroundImage = albumArt ? `url(${albumArt})` : '';
}

async function pollStatusAdaptive() {
  const sessionId = sessionStorage.getItem('sessionId');
  if (!sessionId) return;

  try {
    const res = await fetch(`/api/status?userId=${window.currentUserId}`);

    if (!res.ok) return;
    const data = await res.json();
    if (!data.success) return;

    // Update "Now Playing"
    setNowPlaying(data.title, data.artist, data.albumArt);
    nowMode.textContent = `Mode: ${data.mode || 'DEFAULT'}`;
    statusText.textContent = data.mode === 'PAID'
      ? 'Playing paid queue'
      : (data.isPlaying ? 'Playing' : 'Paused');

    // Show next track info
    if (data.tracks && data.tracks.length > 0) {
      const nextTrack = data.tracks.find(t => t.status === 'Added');
      if (nextTrack) {
        nextTitleEl.textContent = `${nextTrack.title} — ${nextTrack.artist}`;
      }
      queueCount.textContent = `Paid queue: ${data.totalTracks}`;
      queueDurationText.textContent = `Estimated duration: ${
        Math.round(data.tracks.reduce((s, i) => s + (i.duration_ms || 0), 0) / 60000)
      } min`;
    }

    // Refresh queue display
    renderQueue();

    // Adaptive interval
    const desiredInterval = data.isPlaying ? 1000 : 8000;
    if (desiredInterval !== currentInterval) {
      currentInterval = desiredInterval;
      if (pollHandle) clearInterval(pollHandle);
      pollHandle = setInterval(pollStatusAdaptive, currentInterval);
    }
  } catch (err) {
    console.error('pollStatusAdaptive error', err);
  }
}

// Run immediately once
pollStatusAdaptive();

// Start with default interval
pollHandle = setInterval(pollStatusAdaptive, currentInterval);


/* ====== Payment success handler ====== */
async function onPaymentSuccess() {
  const fetchWithTimeout = async (url, opts = {}, timeout = 10000) => {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(url, { ...opts, signal: controller.signal });
      clearTimeout(id);
      return res;
    } catch (err) {
      clearTimeout(id);
      throw err;
    }
  };

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const postPlayWithBackoff = async (payload, attempts = 3) => {
    let delay = 800;
    for (let i = 1; i <= attempts; i++) {
      try {
        if (i > 1) {
          const submitButton = document.querySelector('#payment-complete-button');
          if (submitButton) submitButton.textContent = `Retrying (${i}/${attempts})...`;
        }
        const res = await fetchWithTimeout('/api/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }, 15000);
        return res;
      } catch (err) {
        console.warn(`postPlay attempt ${i} failed`, err);
        if (i === attempts) throw err;
        await sleep(delay);
        delay *= 2;
      }
    }
  };

  const queueTrackWithRetries = async (track, sessionId, maxAttempts = 4) => {
    let attempt = 0;
    let delay = 600;
    const payload = {
      uri: track.uri,
      sessionId,
      userId: window.currentUserId || null,
      title: track.title,
      artist: track.artist,
      duration_ms: track.duration_ms,
      albumArt: track.albumArt
    };

    while (attempt < maxAttempts) {
      attempt++;
      try {
        const res = await fetchWithTimeout('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }, 10000);

        let body = null;
        try { body = await res.json().catch(() => null); } catch (e) { body = null; }

        if (!res.ok && body?.code === 'NO_ACTIVE_DEVICE') {
          return { ok: false, code: 'NO_ACTIVE_DEVICE', details: body };
        }

        if (!res.ok) {
          const txt = body || await res.text().catch(() => '<no body>');
          console.warn('queueTrack failed', res.status, txt);
          if (res.status >= 500 || res.status === 0) {
            if (attempt < maxAttempts) await sleep(delay);
            delay *= 2;
            continue;
          }
          return { ok: false, code: 'FAILED', details: txt };
        }

        return { ok: true, body };
      } catch (err) {
        console.warn(`queueTrack attempt ${attempt} error`, err);
        if (attempt >= maxAttempts) throw err;
        await sleep(delay);
        delay *= 2;
      }
    }
    return { ok: false, code: 'FAILED', details: 'Max attempts reached' };
  };

  try {
    const tracksJson = sessionStorage.getItem('tracks');
    if (!tracksJson) return;
    const tracks = JSON.parse(tracksJson);
    if (!Array.isArray(tracks) || tracks.length === 0) {
      sessionStorage.removeItem('tracks');
      return;
    }

    const checkoutId = sessionStorage.getItem('checkoutId') || crypto.randomUUID();
    const today = new Date().toISOString().slice(0, 10);
    const sessionId = `${today}-${checkoutId}-${Date.now().toString().slice(-6)}`;
    const submissionMarkerKey = `paidSubmitted_${checkoutId}`;

    if (sessionStorage.getItem(submissionMarkerKey)) {
      sessionStorage.setItem('sessionId', sessionStorage.getItem(`sessionId_${checkoutId}`) || sessionId);
      return;
    }

    let activeSessionId = null;
    try {
      const statusRes = await fetchWithTimeout('/api/status', { method: 'GET' }, 8000);
      if (statusRes && statusRes.ok) {
        const statusData = await statusRes.json().catch(() => null);
        if (statusData?.mode === 'PAID' && statusData?.sessionId) {
          activeSessionId = statusData.sessionId;
        }
      }
    } catch (err) {
      console.warn('Could not fetch /api/status before /api/play; proceeding to submit payment result.', err);
    }

    const payload = {
      sessionId: activeSessionId || sessionId,
      userId: window.currentUserId || null,
      tracks,
      append: !!activeSessionId
    };

    const submitButton = document.querySelector('#payment-complete-button');
    if (submitButton) {
      submitButton.disabled = true;
      submitButton.dataset.prevText = submitButton.textContent;
      submitButton.textContent = 'Adding tracks...';
    }
    const statusText = document.querySelector('#paid-status-text');

    const playRes = await postPlayWithBackoff(payload, 3);
    if (!playRes) throw new Error('No response from /api/play');

    let playBody = null;
    try { playBody = await playRes.json().catch(() => null); } catch (e) { playBody = null; }

    if (!playRes.ok && playBody?.code === 'NO_ACTIVE_DEVICE') {
      alert('Venue player is offline. Please start the venue Spotify player and retry. Tracks were not queued.');
      if (submitButton) {
        submitButton.disabled = false;
        submitButton.textContent = submitButton.dataset.prevText || 'Done';
      }
      return;
    }

    if (!playRes.ok) {
      const details = playBody || await playRes.text().catch(() => '<no body>');
      alert('Could not add tracks to the paid queue. Please try again or contact support.');
      if (submitButton) {
        submitButton.disabled = false;
        submitButton.textContent = submitButton.dataset.prevText || 'Done';
      }
      return;
    }

    const addedUris = Array.isArray(playBody?.addedUris) ? playBody.addedUris : [];
    const failedTracks = Array.isArray(playBody?.failedTracks) ? playBody.failedTracks : [];

    if (addedUris.length >= tracks.length && failedTracks.length === 0) {
      sessionStorage.setItem(submissionMarkerKey, 'true');
      sessionStorage.setItem(`sessionId_${checkoutId}`, payload.sessionId);
      sessionStorage.setItem('sessionId', payload.sessionId);
      sessionStorage.removeItem('tracks');
      if (!activeSessionId) {
        if (typeof startPaidQueuePlayback === 'function') {
          try { startPaidQueuePlayback(payload.sessionId); } catch (e) { console.warn('startPaidQueuePlayback failed', e); }
        }
        if (statusText) statusText.textContent = 'Starting paid playback...';
      } else {
        if (statusText) statusText.textContent = 'Tracks appended to existing paid queue';
      }
      if (submitButton) submitButton.textContent = submitButton.dataset.prevText || 'Done';
      return;
    }

    const stillToQueue = tracks.filter(t => !addedUris.includes(t.uri));
    if (stillToQueue.length === 0) {
      sessionStorage.setItem(submissionMarkerKey, 'true');
      sessionStorage.setItem(`sessionId_${checkoutId}`, payload.sessionId);
      sessionStorage.setItem('sessionId', payload.sessionId);
      sessionStorage.removeItem('tracks');
      if (submitButton) submitButton.textContent = submitButton.dataset.prevText || 'Done';
      return;
    }

    const perTrackResults = [];
    for (const t of stillToQueue) {
      const alreadyAddedMarker = sessionStorage.getItem(`added_${payload.sessionId}_${t.uri}`);
      if (alreadyAddedMarker) {
        perTrackResults.push({ uri: t.uri, ok: true, note: 'client-marked-added' });
        continue;
      }

      const result = await queueTrackWithRetries(t, payload.sessionId, 4).catch(err => ({ ok: false, code: 'EXCEPTION', details: err?.message || String(err) }));
      if (result.ok) {
        sessionStorage.setItem(`added_${payload.sessionId}_${t.uri}`, 'true');
      }
      perTrackResults.push({ uri: t.uri, ...result });
      await sleep(120);
    }

    const failedAfterRetries = perTrackResults.filter(r => !r.ok && r.code !== 'NO_ACTIVE_DEVICE');
    const noDeviceHits = perTrackResults.filter(r => r.code === 'NO_ACTIVE_DEVICE');

    if (noDeviceHits.length > 0) {
      alert('Venue player is currently offline. Some tracks were not queued. Please start the venue Spotify player and retry the failed submissions from the admin UI.');
      if (submitButton) {
        submitButton.disabled = false;
        submitButton.textContent = submitButton.dataset.prevText || 'Done';
      }
      return;
    }

    if (failedAfterRetries.length > 0) {
      sessionStorage.setItem(submissionMarkerKey, 'true');
      sessionStorage.setItem(`sessionId_${checkoutId}`, payload.sessionId);
      sessionStorage.setItem('sessionId', payload.sessionId);
      sessionStorage.removeItem('tracks');
      alert(`Some tracks could not be queued immediately (${failedAfterRetries.length}). They will be retried in the background. If the issue persists, contact support.`);
      if (submitButton) submitButton.textContent = submitButton.dataset.prevText || 'Done';
      return;
    }

    sessionStorage.setItem(submissionMarkerKey, 'true');
    sessionStorage.setItem(`sessionId_${checkoutId}`, payload.sessionId);
    sessionStorage.setItem('sessionId', payload.sessionId);
    sessionStorage.removeItem('tracks');

    if (!activeSessionId) {
      if (typeof startPaidQueuePlayback === 'function') {
        try { startPaidQueuePlayback(payload.sessionId); } catch (e) { console.warn('startPaidQueuePlayback failed', e); }
      }
      if (statusText) statusText.textContent = 'Starting paid playback...';
    } else {
      if (statusText) statusText.textContent = 'Tracks appended to existing paid queue';
    }

    if (submitButton) submitButton.textContent = submitButton.dataset.prevText || 'Done';
  } catch (e) {
    console.error('onPaymentSuccess error', e);
    const msg = (e && e.message) ? e.message : 'Something went wrong adding your tracks after payment.';
    if (msg.toLowerCase().includes('no active') || msg.toLowerCase().includes('device')) {
      alert('Venue player appears offline. Please start the venue Spotify player and retry.');
    } else {
      alert('Something went wrong adding your tracks after payment. Please try again or contact support.');
    }
    const submitButton = document.querySelector('#payment-complete-button');
    if (submitButton) {
      submitButton.disabled = false;
      submitButton.textContent = submitButton.dataset.prevText || 'Done';
    }
  }
}

function applyPackageFromQuery({ autoMarkPaid = false } = {}){
  const params = new URLSearchParams(window.location.search);
  const price = params.get('price');
  const songs = params.get('songs');
  if (!price || !songs) return null;
  const maxSongs = parseInt(songs, 10) || 0;
  currentPackage = { price, maxSongs };
  paymentComplete = !!autoMarkPaid;
  songsAddedThisSession = 0;
  return currentPackage;
}

  if (searchRow) searchRow.style.display = 'flex';
}


(function () {

  const MAX_BATCH_RETRIES = 4;
  const PER_TRACK_RETRY_ATTEMPTS = 4;
  const MAX_BATCH_SIZE = 12; // safety cap

  // --- State ---
  let appendBatch = [];
  let appendTimer = null;
  let flushInProgress = false;

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const fetchWithTimeout = async (url, opts = {}, timeout = 10000) => {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(url, { ...opts, signal: controller.signal });
      clearTimeout(id);
      return res;
    } catch (err) {
      clearTimeout(id);
      throw err;
    }
  };

  function persistPaidQueue(paidQueue) {
    try {
      sessionStorage.setItem('paidQueue', JSON.stringify(paidQueue));
    } catch (e) {
      console.warn('Could not persist paidQueue to sessionStorage', e);
    }
  }

  function markClientAdded(sessionId, uri) {
    try {
      sessionStorage.setItem(`added_${sessionId}_${uri}`, 'true');
    } catch (e) {
      // ignore
    }
  }

  function isClientMarkedAdded(sessionId, uri) {
    return !!sessionStorage.getItem(`added_${sessionId}_${uri}`);
  }

  // --- Core: flush batch to backend with retries and partial handling ---
  async function flushAppendBatch(sessionId) {
    if (!appendBatch.length) return;
    if (flushInProgress) return; // avoid concurrent flushes
    flushInProgress = true;

    // take up to MAX_BATCH_SIZE items
    const batch = appendBatch.slice(0, MAX_BATCH_SIZE);
    // keep remainder in queue
    appendBatch = appendBatch.slice(batch.length);
    clearTimeout(appendTimer);
    appendTimer = null;

    // build payload
    const payload = {
      sessionId,
      checkoutId: sessionStorage.getItem('checkoutId') || null,
      append: true,
      tracks: batch
    };

    let attempt = 0;
    let delay = BATCH_RETRY_BASE_MS;

    while (attempt < MAX_BATCH_RETRIES) {
      attempt++;
      try {
        const res = await fetchWithTimeout('/api/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }, 15000);

        // try parse JSON
        let body = null;
        try { body = await res.json().catch(() => null); } catch (e) { body = null; }

        // If backend signals NO_ACTIVE_DEVICE, push batch back and stop retries
        if (!res.ok && body?.code === 'NO_ACTIVE_DEVICE') {
          // requeue batch at front and notify staff
          appendBatch = batch.concat(appendBatch);
          if (typeof statusText !== 'undefined' && statusText) {
            statusText.textContent = 'Venue player offline. Start the player and retry.';
          }
          flushInProgress = false;
          return;
        }

        if (!res.ok) {
          const details = body || await res.text().catch(() => '<no body>');
          console.warn('Batch append failed', res.status, details);
          if (attempt < MAX_BATCH_RETRIES) {
            await sleep(delay);
            delay *= 2;
            continue;
          } else {
            // give up for now: requeue and schedule retry
            appendBatch = batch.concat(appendBatch);
            scheduleFlushRetry(sessionId, delay);
            flushInProgress = false;
            return;
          }
        }

        // Success: backend accepted. Backend should return structured queuedUris and failedTracks
        const addedUris = Array.isArray(body?.addedUris) ? body.addedUris : [];
        const failedTracks = Array.isArray(body?.failedTracks) ? body.failedTracks : [];

        // Mark client-side queued URIs to avoid re-submission
        addedUris.forEach(uri => markClientAdded(sessionId, uri));

        // If there are failedTracks, attempt per-track retries (best-effort)
        if (failedTracks.length > 0) {
          // Map failed URIs to track objects from the batch
          const failedUris = failedTracks.map(f => f.uri);
          const toRetry = batch.filter(t => failedUris.includes(t.uri));
          // Requeue other failed items to appendBatch front so they will be retried later
          const permanentlyFailed = []; // collect those that still fail after per-track retries
          for (const t of toRetry) {
            const r = await retryQueueTrack(t, sessionId);
            if (!r.ok) {
              permanentlyFailed.push({ uri: t.uri, reason: r.details || r.code || 'unknown' });
            } else {
              markClientAdded(sessionId, t.uri);
            }
            // small gap to avoid bursts
            await sleep(120);
          }

          if (permanentlyFailed.length > 0) {
            console.warn('Some tracks permanently failed to queue in this attempt', permanentlyFailed);
            // Requeue permanently failed tracks for background worker; keep them out of immediate appendBatch
            // For now, append them back so they will be retried later by client or worker
            appendBatch = permanentlyFailed.map(pf => {
              const original = batch.find(b => b.uri === pf.uri);
              return original || { uri: pf.uri };
            }).concat(appendBatch);
            scheduleFlushRetry(sessionId, BATCH_RETRY_BASE_MS * 4);
          }
        }

        // If backend queued some or all, log and finish
        console.log('Appended batch result addedUris:', addedUris, 'failed:', failedTracks);
        flushInProgress = false;

        // If there are still items in appendBatch, schedule immediate flush
        if (appendBatch.length > 0) {
          if (!appendTimer) appendTimer = setTimeout(() => flushAppendBatch(sessionId), APPEND_BATCH_MS);
        }
        return;
      } catch (err) {
        console.warn(`flushAppendBatch attempt ${attempt} error`, err);
        if (attempt >= MAX_BATCH_RETRIES) {
          // requeue and schedule retry
          appendBatch = batch.concat(appendBatch);
          scheduleFlushRetry(sessionId, delay);
          flushInProgress = false;
          return;

        const startMarkerKey = `paidStarted_${sid}`;
        if (!sessionStorage.getItem(startMarkerKey)) {
          sessionStorage.setItem(startMarkerKey, 'true');
          statusText && (statusText.textContent = 'Starting paid playback...');
          try {
            await startPaidQueuePlayback(sid, false);
            paidSessionActive = true;
            statusText && (statusText.textContent = 'Paid playback started');
          } catch (err) {
            console.error('startPaidQueuePlayback failed', err);
            statusText && (statusText.textContent = 'Failed to start paid playback — will retry');
            sessionStorage.removeItem(startMarkerKey);
            // still allow adding to appendBatch so it will be queued when player comes online
          }
        } else {
          statusText && (statusText.textContent = 'Paid playback starting (in progress)');
        }
        // still add to appendBatch so it will be queued once active
      }

      // add to appendBatch and schedule flush
      appendBatch.push(normalized);
      if (!appendTimer) {
        appendTimer = setTimeout(() => flushAppendBatch(sid), APPEND_BATCH_MS);
      }

      statusText && (statusText.textContent = 'Track added to paid queue');
    } catch (err) {
      console.error('addToPaidQueue error', err);
      alert('Something went wrong adding the track. Please try again.');
    }
  };
})();

// frontend: play first track, disable shuffle/repeat, queue rest, and return {ok:true} on success
async function backendPlayTracks(tracks, { sessionId, append }) {
  try {
    if (!tracks || tracks.length === 0) return { ok: false, error: 'no tracks' };

    const payload = {
      sessionId: sessionId || sessionStorage.getItem('sessionId'),
      userId: sessionStorage.getItem('userId') || null,
      append,
      tracks // full track objects
    };

    const res = await fetch('/api/play', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(() => ({}));
    console.log('/api/play response:', res.status, data);

    if (!res.ok) {
      return { ok: false, error: 'play failed', details: data };
    }

    return { ok: true, details: data };
  } catch (e) {
    console.error('backendPlayTracks error', e);
    return { ok: false, error: e.message };
  }
}

async function renderQueueAndHistory() {
  try {
    if (!checkoutQueueList) return;

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('checkoutId'); // reuse checkoutId as sessionId
    if (!sessionId) return;

    const res = await fetch(`/api/progress?sessionId=${sessionId}`);
    const data = await res.json();
    if (!data.success) return;

    const tracks = data.tracks || [];
    checkoutQueueList.innerHTML = '';
    const frag = document.createDocumentFragment();

    let totalMs = 0;
    const playedQueue = [];
    const paidQueue = [];

    tracks.forEach((item, index) => {
      totalMs += item.duration_ms || 0;

      // Split into played vs active
      if (item.status === 'Played') {
        playedQueue.push(item);
      } else {
        paidQueue.push(item);
      }

      // Build queue UI
      const wrapper = document.createElement('div');
      wrapper.className = 'queue-item';
      wrapper.style.display = 'flex';
      wrapper.style.justifyContent = 'space-between';
      wrapper.style.alignItems = 'center';
      wrapper.style.gap = '12px';
      wrapper.dataset.index = String(index);

      const left = document.createElement('div');
      left.style.minWidth = '0';
      left.style.flex = '1';

      const titleDiv = document.createElement('div');
      titleDiv.style.fontWeight = '700';
      titleDiv.style.whiteSpace = 'nowrap';
      titleDiv.style.overflow = 'hidden';
      titleDiv.style.textOverflow = 'ellipsis';
      titleDiv.textContent = item.title || '';

      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      metaDiv.style.fontSize = '0.9em';
      metaDiv.style.color = '#666';
      metaDiv.textContent = item.artist || '';

      left.appendChild(titleDiv);
      left.appendChild(metaDiv);

      const right = document.createElement('div');
      right.style.display = 'flex';
      right.style.flexDirection = 'column';
      right.style.gap = '6px';
      right.style.alignItems = 'flex-end';
      right.style.minWidth = '90px';

      const durationDiv = document.createElement('div');
      durationDiv.className = 'small';
      durationDiv.style.fontSize = '0.85em';
      durationDiv.style.color = '#333';
      durationDiv.textContent = formatMs(item.duration_ms || 0);

      const statusDiv = document.createElement('div');
      statusDiv.style.fontSize = '0.75em';
      statusDiv.className = `status ${item.status.toLowerCase()}`;
      statusDiv.textContent = item.status;

      right.appendChild(durationDiv);
      right.appendChild(statusDiv);

      wrapper.appendChild(left);
      wrapper.appendChild(right);

      frag.appendChild(wrapper);
    });

    checkoutQueueList.appendChild(frag);

    if (checkoutQueueCount) {
      checkoutQueueCount.textContent = `Paid queue: ${paidQueue.length}`;
    }
    if (checkoutQueueDuration) {
      checkoutQueueDuration.textContent = `Estimated duration: ${Math.round(totalMs / 60000)} min`;
    }
    if (checkoutNextTitle) {
      const nextTrack = paidQueue.find(t => t.status === 'Added');
      checkoutNextTitle.textContent = nextTrack
        ? `${nextTrack.title} — ${nextTrack.artist}`
        : 'No paid tracks queued';
    }

    // ✅ Render played history from the same response
    const playedQueueList = document.getElementById('playedQueueList');
    if (playedQueueList) {
      playedQueueList.innerHTML = '';

      // Add summary line
      const summary = document.createElement('div');
      summary.className = 'small';
      summary.style.marginBottom = '8px';
      summary.textContent = `Played ${playedQueue.length} of ${tracks.length}`;
      playedQueueList.appendChild(summary);

      const fragHistory = document.createDocumentFragment();

        wrapper.appendChild(left);

    }
