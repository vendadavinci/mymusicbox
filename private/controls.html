<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Musicbox Controls</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: goldenrod;
    }
    .section {
      margin-bottom: 24px;
      padding: 16px;
      background: #222;
      border-radius: 8px;
    }
    button {
      background: goldenrod;
      border: none;
      padding: 8px 12px;
      margin: 4px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    button:hover:enabled {
      background: #daa520;
    }
    input {
      padding: 6px;
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #333;
      color: #eee;
    }
  </style>
</head>
<body>
  <h1>Musicbox Private Controls</h1>

  <div class="section">
    <h2>Playback</h2>
    <!-- Force playback button replaces Resume Default -->
    <button id="forcePlaybackBtn" onclick="forcePlayback()">Force Playback</button>
    <button onclick="pausePlayback()">Pause</button>
    <button onclick="skipTrack()">Skip Track</button>
  </div>

  <div class="section">
    <h2>Queue Management</h2>
    <button onclick="clearQueue()">Clear Paid Queue</button>
    <button onclick="refreshQueue()">Refresh Queue</button>

<div class="section">
  <h2>Pending Cash Payments</h2>
  <div id="pendingRequests"></div>
</div>

  </div>

  <div class="section">
    <h2>Session Management</h2>
    <input id="sessionId" placeholder="Session ID">
    <button onclick="endSession()">End Session</button>
  </div>

  <script>

async function loadPendingRequests() {
  const res = await fetch('/api/pending-cash');
  const json = await res.json();
  const container = document.getElementById('pendingRequests');
  container.innerHTML = '';
  json.forEach(req => {
    const div = document.createElement('div');
    div.className = 'pending-item';
div.innerHTML = `
  <div>
    <strong>Code:</strong> ${req.cashCode} |
    <strong>Package:</strong> ${req.songsAdded} songs |
    <strong>Price:</strong> ${req.amount} ${req.currency}
  </div>
  <button onclick="approveCash('${req.checkoutId}')">Approve</button>
  <button onclick="deleteCash('${req.checkoutId}')">Delete</button>
`;

    container.appendChild(div);
  });
}

async function approveCash(checkoutId) {
  try {
    // Step 1: Approve cash
    const res = await fetch('/api/approve-cash', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ checkoutId })
    });
    const json = await res.json();
    if (!json.ok) {
      alert('Failed to approve cash payment');
      return;
    }

    alert('Cash payment approved');

    // Step 2: Immediately fetch status for this checkout
    const statusRes = await fetch(`/api/status?checkoutId=${checkoutId}`);
    const statusJson = await statusRes.json();

    // Step 3: Render the paid queue into the checkout card
    const list = document.getElementById('checkoutQueueList');
    list.innerHTML = '';
    statusJson.tracks.forEach(t => {
      const li = document.createElement('div');
      li.className = 'queue-item';
      li.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="${t.albumArt}" style="width:40px;height:40px;border-radius:4px;">
          <div>
            <div style="font-weight:600;">${t.title}</div>
            <div class="small">${t.artist}</div>
            <div class="small">Status: ${t.status}</div>
          </div>
        </div>
      `;
      list.appendChild(li);
    });

    // Update queue info
    document.getElementById('checkoutQueueDuration').textContent =
      `Estimated duration: ${Math.round(statusJson.tracks.reduce((sum, t) => sum + t.duration_ms, 0) / 60000)} min`;
    document.getElementById('queueCount').textContent =
      `Tracks: ${statusJson.totalTracks}`;
    document.getElementById('nextTitleEl').textContent =
      `Next: ${statusJson.tracks.find(t => t.status === 'Added')?.title || 'None'}`;
    document.getElementById('statusText').textContent =
      statusJson.isPlaying ? 'Playing' : 'Paused';

    // Step 4: Refresh pending requests list
    loadPendingRequests();
  } catch (err) {
    console.error('Approve cash error', err);
    alert('Error approving cash payment');
  }
}

async function deleteCash(checkoutId) {
  await fetch('/api/delete-cash', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ checkoutId })
  });
  alert('Cash payment deleted');
  loadPendingRequests();
}

document.addEventListener('DOMContentLoaded', loadPendingRequests);

    async function forcePlayback() {
      try {
        const res = await fetch('/api/force-playback', { method: 'POST' });
        if (res.ok) {
          alert('Playback forced to start');
          // disable button once playback is active
          document.getElementById('forcePlaybackBtn').disabled = true;
        } else {
          alert('Failed to force playback');
        }
      } catch (err) {
        console.error('Force playback error', err);
        alert('Error forcing playback');
      }
    }

    async function pausePlayback() {
      await fetch('/api/pause', { method: 'POST' });
      alert('Playback paused');
      // re-enable force button if paused
      document.getElementById('forcePlaybackBtn').disabled = false;
    }

    async function skipTrack() {
      await fetch('/api/skip', { method: 'POST' });
      alert('Track skipped');
    }

    async function clearQueue() {
      await fetch('/api/clear-queue', { method: 'POST' });
      alert('Queue cleared');
    }

    async function refreshQueue() {
      await fetch('/api/refresh-queue');
      alert('Queue refreshed');
    }

    async function endSession() {
      const id = document.getElementById('sessionId').value.trim();
      if (!id) return alert('Enter a session ID');
      await fetch('/api/end-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: id })
      });
      alert('Session ended: ' + id);
    }


  </script>

<script>
async function loadPendingRequests() {
  const res = await fetch('/api/pending-cash');
  const json = await res.json();
  const container = document.getElementById('pendingRequests');
  container.innerHTML = '';
  json.forEach(req => {
    const div = document.createElement('div');
    div.className = 'pending-item';
    div.innerHTML = `
      <div>
        <strong>Code:</strong> ${req.cashCode} |
        <strong>Package:</strong> ${req.songsAdded} songs |
        <strong>Price:</strong> ${req.amount} ${req.currency}
      </div>
      <button onclick="approveCash('${req.checkoutId}')">Approve</button>
      <button onclick="deleteCash('${req.checkoutId}')">Delete</button>
    `;
    container.appendChild(div);
  });
}

async function refreshCheckoutQueue() {
  const checkoutId = sessionStorage.getItem('checkoutId');
  if (!checkoutId) return;

  try {
    const statusRes = await fetch(`/api/status?checkoutId=${checkoutId}`);
    const statusJson = await statusRes.json();

    const list = document.getElementById('checkoutQueueList');
    list.innerHTML = '';
    statusJson.tracks.forEach(t => {
      const li = document.createElement('div');
      li.className = 'queue-item';
      li.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="${t.albumArt}" style="width:40px;height:40px;border-radius:4px;">
          <div>
            <div style="font-weight:600;">${t.title}</div>
            <div class="small">${t.artist}</div>
            <div class="small">Status: ${t.status}</div>
          </div>
        </div>
      `;
      list.appendChild(li);
    });

    document.getElementById('checkoutQueueDuration').textContent =
      `Estimated duration: ${Math.round(statusJson.tracks.reduce((sum, t) => sum + t.duration_ms, 0) / 60000)} min`;
    document.getElementById('queueCount').textContent =
      `Tracks: ${statusJson.totalTracks}`;
    document.getElementById('nextTitleEl').textContent =
      `Next: ${statusJson.tracks.find(t => t.status === 'Added')?.title || 'None'}`;
    document.getElementById('statusText').textContent =
      statusJson.isPlaying ? 'Playing' : 'Paused';
  } catch (err) {
    console.error('Queue refresh error', err);
  }
}

// 🔄 Poll every 2 seconds
document.addEventListener('DOMContentLoaded', () => {
  loadPendingRequests();
  refreshCheckoutQueue();
  setInterval(() => {
    loadPendingRequests();
    refreshCheckoutQueue();
  }, 2000);
});
</script>


</body>
</html>
