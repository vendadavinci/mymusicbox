<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Musicbox Controls</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: goldenrod;
    }
    .section {
      margin-bottom: 24px;
      padding: 16px;
      background: #222;
      border-radius: 8px;
    }
    button {
      background: goldenrod;
      border: none;
      padding: 8px 12px;
      margin: 4px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    button:hover:enabled {
      background: #daa520;
    }
    input {
      padding: 6px;
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #333;
      color: #eee;
    }
  </style>
</head>
<body>
  <h1>Musicbox Private Controls</h1>

  <div class="section">
    <h2>Playback</h2>
    <!-- Force playback button replaces Resume Default -->
    <button id="forcePlaybackBtn" onclick="forcePlayback()">Force Playback</button>
    <button onclick="pausePlayback()">Pause</button>
    <button onclick="skipTrack()">Skip Track</button>
  </div>

  <div class="section">
    <h2>Queue Management</h2>
    <button onclick="clearQueue()">Clear Paid Queue</button>
    <button onclick="refreshQueue()">Refresh Queue</button>

<div class="section">
  <h2>Pending Cash Payments</h2>
  <div id="pendingRequests"></div>
</div>

  </div>

  <div class="section">
    <h2>Session Management</h2>
    <input id="sessionId" placeholder="Session ID">
    <button onclick="endSession()">End Session</button>
  </div>

  <script>

async function loadPendingRequests() {
  const res = await fetch('/api/pending-cash');
  const json = await res.json();
  const container = document.getElementById('pendingRequests');
  container.innerHTML = '';
  json.forEach(req => {
    const div = document.createElement('div');
    div.className = 'pending-item';
    div.innerHTML = `
      <div><strong>Code:</strong> ${req.cashCode} | <strong>Package:</strong> ${req.songsAdded} songs</div>
      <button onclick="approveCash('${req.checkoutId}')">Approve</button>
      <button onclick="deleteCash('${req.checkoutId}')">Delete</button>
    `;
    container.appendChild(div);
  });
}

async function approveCash(checkoutId) {
  await fetch('/api/approve-cash', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ checkoutId })
  });
  alert('Cash payment approved');
  loadPendingRequests();
}

async function deleteCash(checkoutId) {
  await fetch('/api/delete-cash', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ checkoutId })
  });
  alert('Cash payment deleted');
  loadPendingRequests();
}

document.addEventListener('DOMContentLoaded', loadPendingRequests);

    async function forcePlayback() {
      try {
        const res = await fetch('/api/force-playback', { method: 'POST' });
        if (res.ok) {
          alert('Playback forced to start');
          // disable button once playback is active
          document.getElementById('forcePlaybackBtn').disabled = true;
        } else {
          alert('Failed to force playback');
        }
      } catch (err) {
        console.error('Force playback error', err);
        alert('Error forcing playback');
      }
    }

    async function pausePlayback() {
      await fetch('/api/pause', { method: 'POST' });
      alert('Playback paused');
      // re-enable force button if paused
      document.getElementById('forcePlaybackBtn').disabled = false;
    }

    async function skipTrack() {
      await fetch('/api/skip', { method: 'POST' });
      alert('Track skipped');
    }

    async function clearQueue() {
      await fetch('/api/clear-queue', { method: 'POST' });
      alert('Queue cleared');
    }

    async function refreshQueue() {
      await fetch('/api/refresh-queue');
      alert('Queue refreshed');
    }

    async function endSession() {
      const id = document.getElementById('sessionId').value.trim();
      if (!id) return alert('Enter a session ID');
      await fetch('/api/end-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: id })
      });
      alert('Session ended: ' + id);
    }
  </script>
</body>
</html>
